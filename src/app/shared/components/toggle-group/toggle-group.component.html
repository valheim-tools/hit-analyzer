<div class="toggle-group" [class.disabled]="isDisabled">
  @for (option of options(); track option.value) {
    <label class="toggle-btn">
      <input
        type="radio"
        [name]="groupName()"
        [value]="option.value"
        [checked]="option.value == currentValue"
        [disabled]="isDisabled"
        (change)="onRadioChange(option.value)"
      >
      <span>{{ option.label }}</span>
    </label>
  }
</div>
